model:
  encoder: resnet34
  encoder_weights: imagenet
  num_classes: 8
  in_channels: 3

data:
  root: data/raw/DeepFashion2_subset
  image_size: 512
  batch_size: 12
  num_workers: 6

optimizer:
  learning_rate: 0.0001
  weight_decay: 0.00001

trainer:
  max_epochs: 20
  early_stopping_patience: 5
  precision: 16-mixed
  checkpoint_path: models/unet_rtx5070_best.ckpt
  accelerator: gpu
  devices: 1
  log_dir: results/training_logs
  run_name: unet_rtx5070
  log_every_n_steps: 10
  progress_refresh_rate: 1
  gradient_clip_val: 1.0
  accumulate_grad_batches: 1
  deterministic: false
  save_last: true
  resume_from_checkpoint: null
