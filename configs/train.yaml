model:
  encoder: resnet34
  encoder_weights: imagenet
  num_classes: 8
  in_channels: 3

data:
  root: data/raw/DeepFashion2
  image_size: 512
  batch_size: 16
  num_workers: 4

optimizer:
  learning_rate: 0.0001
  weight_decay: 0.00001

trainer:
  max_epochs: 20
  early_stopping_patience: 5
  precision: 16-mixed
  checkpoint_path: models/unet_best.ckpt
