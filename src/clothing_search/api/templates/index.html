<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ClothLens</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <main class="page-shell">
      <section class="hero">
        <p class="eyebrow">Visual clothing search</p>
        <h1>ClothLens</h1>
        <p>
          Upload a photo, choose the clothing category, and compare the
          segmented crop with catalog items indexed in local Qdrant.
        </p>
      </section>

      <section class="panel">
        <form id="search-form">
          <label>
            Photo
            <input name="file" type="file" accept="image/*" required>
          </label>
          <label>
            Category
            <select name="category">
              {% for category in categories %}
              <option value="{{ category }}">{{ category }}</option>
              {% endfor %}
            </select>
          </label>
          <label>
            Top K
            <input name="top_k" type="number" min="1" max="50" value="{{ default_top_k }}">
          </label>
          <button type="submit">Search Similar Clothes</button>
        </form>
        <p id="status" role="status"></p>
      </section>

      <section class="preview-grid" aria-label="Segmentation preview">
        <article>
          <h2>Crop</h2>
          <img id="crop-image" alt="Selected clothing crop">
        </article>
        <article>
          <h2>Mask</h2>
          <img id="mask-image" alt="Segmentation mask">
        </article>
      </section>

      <section>
        <h2>Results</h2>
        <div id="results" class="results-grid"></div>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
